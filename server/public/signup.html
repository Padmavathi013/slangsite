<!DOCTYPE html>
<html>



<head>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2073785565774099"
     crossorigin="anonymous"></script>
</head>


<body>


<h2>Signup</h2>

<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Signup</button>

<script>
async function signup() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://slangsite-production.up.railway.app/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message);
  } else {
    alert("Signup successful");

// auto login after signup
  const loginRes = await fetch("https://slangsite-production.up.railway.app/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  const loginData = await loginRes.json();

  // save token
  localStorage.setItem("token", loginData.token);

  // go to homepage
  window.location.href = "languages.html";
  }
}

</script>

</body>
</html>
