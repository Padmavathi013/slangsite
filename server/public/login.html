
<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2073785565774099"
     crossorigin="anonymous"></script>
</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<script>

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("https://slangsite-production.up.railway.app/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Login failed");
      return;
    }

    localStorage.setItem("token", data.token);
    alert("Login successful");
    window.location.href = "languages.html";

  } catch (err) {
    console.log(err);
    alert("Server not reachable");
  }
}
</script>

</div>

<footer style="text-align:center; padding: 20px; font-size: 13px;">
  <a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
